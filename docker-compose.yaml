services:
  frontend:
    image: ghcr.io/riccardo-modina/financeapp-frontend:latest
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8080}
    #    ports:
    #      - "5173:80"
    depends_on:
      - backend
    networks:
      - finance_internal

  backend:
    image: ghcr.io/riccardo-modina/financeapp-backend:latest
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      - database
    networks:
      - finance_internal

  database:
    image: postgres:17
    env_file:
      - .env
    volumes:
      - postgres_data_financeapp:/var/lib/postgresql/data
    networks:
      - finance_internal

  adminer:
    image: adminer
    ports:
      - "8081:8080"
    depends_on:
      - database
    networks:
      - finance_internal

volumes:
  postgres_data_financeapp:

networks:
  finance_internal:
    driver: bridge
